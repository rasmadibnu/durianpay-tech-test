openapi: 3.0.3
info:
  title: MyGoLangApp API
  version: "1.0.0"
servers:
  - url: http://localhost:8080

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Merchant
    description: Merchant management
  - name: Payment
    description: Payment management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    search:
      name: search
      in: query
      description: Free-text search term for list filtering
      required: false
      schema:
        type: string
        example: "toko"
    sort:
      name: sort
      in: query
      description: >
        Comma-separated sort fields. Common patterns:
        `-created_at` (prefix `-` = desc)
        `amount` (no prefix `-` = asc)
      required: false
      schema:
        type: string
        example: "-created_at"
    page:
      name: page
      in: query
      description: Page number (1-based)
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
    limit:
      name: limit
      in: query
      description: Number of items per page (max 100)
      required: false
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100

  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          example: 401
        message:
          type: string
          example: "Unauthenticated: missing or invalid token"
      required:
        - code
        - message

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 50
        total_pages:
          type: integer
          example: 5
      required:
        - page
        - limit
        - total
        - total_pages

    User:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
        token:
          type: string

    Merchant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMerchantRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    UpdateMerchantRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    Payment:
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: integer
        merchant_name:
          type: string
        status:
          type: string
        amount:
          type: string
        created_at:
          type: string
          format: date-time

    CreatePaymentRequest:
      type: object
      required: [merchant_id, amount, status]
      properties:
        merchant_id:
          type: integer
        amount:
          type: string
        status:
          type: string

    UpdatePaymentRequest:
      type: object
      required: [merchant_id, amount, status]
      properties:
        merchant_id:
          type: integer
        amount:
          type: string
        status:
          type: string

    ReviewPaymentRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string

  responses:
    LoginResponse:
      description: return token and user information
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/User"
    PaymentListResponse:
      description: Payment List
      content:
        application/json:
          schema:
            type: object
            properties:
              payments:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    MerchantListResponse:
      description: Merchant List
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/PaginationMeta"
              - type: object
                properties:
                  merchants:
                    type: array
                    items:
                      $ref: "#/components/schemas/Merchant"
                required:
                  - merchants
    UnauthorizedError:
      description: Authentication failed or missing credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            unauthenticated:
              summary: Missing or invalid token
              value:
                code: 401
                message: "missing auth header"
    BadRequestError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

paths:
  /dashboard/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/LoginResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  # ── Merchant ──────────────────────────────────────────
  /dashboard/v1/merchants:
    get:
      tags: [Merchant]
      summary: List merchants
      operationId: getDashboardV1Merchants
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          $ref: "#/components/responses/MerchantListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Merchant]
      summary: Create a merchant
      operationId: postDashboardV1Merchants
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMerchantRequest"
      responses:
        "201":
          description: Created merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /dashboard/v1/merchants/{id}:
    get:
      tags: [Merchant]
      summary: Get a merchant
      operationId: getDashboardV1MerchantsId
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    put:
      tags: [Merchant]
      summary: Update a merchant
      operationId: putDashboardV1MerchantsId
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMerchantRequest"
      responses:
        "200":
          description: Updated merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    delete:
      tags: [Merchant]
      summary: Delete a merchant
      operationId: deleteDashboardV1MerchantsId
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Merchant deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  # ── Payment ───────────────────────────────────────────
  /dashboard/v1/payments:
    get:
      tags: [Payment]
      summary: List payments
      operationId: getDashboardV1Payments
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - in: query
          name: status
          schema:
            type: string
          description: status of payment (completed, processing, or failed)
        - in: query
          name: id
          schema:
            type: string
          description: payment id
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/PaymentListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      tags: [Payment]
      summary: Create a payment
      operationId: postDashboardV1Payments
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentRequest"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /dashboard/v1/payments/{id}:
    put:
      tags: [Payment]
      summary: Update a payment
      operationId: putDashboardV1PaymentsId
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentRequest"
      responses:
        "200":
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    delete:
      tags: [Payment]
      summary: Delete a payment
      operationId: deleteDashboardV1PaymentsId
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Payment deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /dashboard/v1/payments/{id}/review:
    put:
      tags: [Payment]
      summary: Review payment (update status)
      operationId: putDashboardV1PaymentsIdReview
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewPaymentRequest"
      responses:
        "200":
          description: Status updated
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
