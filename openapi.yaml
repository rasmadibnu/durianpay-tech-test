openapi: 3.0.3
info:
  title: MyGoLangApp API
  version: "1.0.0"
servers:
  - url: http://localhost:8080

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Merchant
    description: Merchant management
  - name: Payment
    description: Payment management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    sort:
      name: sort
      in: query
      description: >
        Comma-separated sort fields. Common patterns:
        `-created_at` (prefix `-` = desc)
        `amount` (no prefix `-` = asc)
      required: false
      schema:
        type: string
        example: "-created_at"

  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          example: 401
        message:
          type: string
          example: "Unauthenticated: missing or invalid token"
      required:
        - code
        - message

    User:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
        token:
          type: string

    Merchant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMerchantRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    UpdateMerchantRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    Payment:
      type: object
      properties:
        id:
          type: string
          example: "1"
        merchant:
          type: string
          example: "Merchant A"
        status:
          type: string
          example: "completed , processing , or failed"
        amount:
          type: string
          example: "alice@example.com"
        created_at:
          type: string
          format: date-time

  responses:
    LoginResponse:
      description: return token and user information
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/User"
    PaymentListResponse:
      description: Payment List
      content:
        application/json:
          schema:
            type: object
            properties:
              payments:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    MerchantListResponse:
      description: Merchant List
      content:
        application/json:
          schema:
            type: object
            properties:
              merchants:
                type: array
                items:
                  $ref: "#/components/schemas/Merchant"
    UnauthorizedError:
      description: Authentication failed or missing credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            unauthenticated:
              summary: Missing or invalid token
              value:
                code: 401
                message: "Unauthenticated: missing or invalid token"

paths:
  /dashboard/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/LoginResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  # ── Merchant ──────────────────────────────────────────
  /dashboard/v1/merchants:
    get:
      tags: [Merchant]
      summary: List merchants
      operationId: getDashboardV1Merchants
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/MerchantListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      tags: [Merchant]
      summary: Create a merchant
      operationId: postDashboardV1Merchants
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMerchantRequest"
      responses:
        "201":
          description: Created merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /dashboard/v1/merchants/{id}:
    get:
      tags: [Merchant]
      summary: Get a merchant
      operationId: getDashboardV1MerchantsId
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    put:
      tags: [Merchant]
      summary: Update a merchant
      operationId: putDashboardV1MerchantsId
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMerchantRequest"
      responses:
        "200":
          description: Updated merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    delete:
      tags: [Merchant]
      summary: Delete a merchant
      operationId: deleteDashboardV1MerchantsId
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Merchant deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /dashboard/v1/payments:
    get:
      summary: List of payments
      parameters:
        - $ref: "#/components/parameters/sort"
        - in: query
          name: status
          schema:
            type: string
          description: status of payment (completed , processing , or failed)
        - in: query
          name: id
          schema:
            type: string
          description: payment id
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/PaymentListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
